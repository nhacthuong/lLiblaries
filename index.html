<!DOCTYPE html>
<html lang="vi" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Mật Tạng Thư Viện</title>
        <link rel="icon" type="image/png" href="./favico.svg">
        <link rel="stylesheet" href="./style.css">
        <link rel="stylesheet" href="./style_767.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script type="text/javascript" src="./data.js" defer></script>
        <script type="text/javascript" src="./functions.js" defer></script>
        <script type="text/javascript" src="./index.js" defer></script>
    </head>
    <body>
        <div class="app-wrapper">
            <!-- left-colum menu -->
            <aside id="menuLeft" class="sidebar" onclick="openMenuLeft()">
                <div class="sidebar-top">
                    <span class="brand">Mật Tạng Thư Viện</span>
                    <!-- <button class="btn-action">Gieo Quẻ</button> -->
                </div>
                <input type="text" class="side-search" placeholder="Tìm tài liệu...">                
                <nav class="nav-tree"></nav>
            </aside>
            <!-- center-colum -->
            <main class="main-content">
                <header class="main-nav">
                    <div class="screen-767 nav-pointer" onclick="openMenuLeft()"><img src="./favico.svg"/></div>
                    <div class="screen-max"><img src="./favico.svg" /></div>
                    <div class="search-bar" onclick="openSearch()">
                        <i class="fas fa-search screen-max"></i>
                        <span>Bấm <strong>/</strong> để tra cứu</span>
                    </div>
                    <div id="btnSetting" class="nav-pointer"><i class="fas fa-cog"></i></div>
                </header>

                <div class="content-body">  
                    <!-- card-info -->
                    <div class="feed-section"></div>
                </div>
            </main>
            <!-- right-column sticky info -->
            <aside class="right-panel">
                <div class="news-card">
                    <h3>Cập nhật mới</h3>
                    <ul>
                        <li><small>2h trước</small> <p>Bổ sung giải mã quẻ Thuần Càn.</p></li>
                        <li><small>5h trước</small> <p>Video AI: Sự tích Văn Khúc.</p></li>
                    </ul>
                </div>
            </aside>
        </div>
        <!-- more-tools popup/bottom-sheet -->
        <div id="infoPopup" class="modal">
            <div class="popup modal-content">
                <div class="popup-title">
                    <h1>Test</h1>
                    <i class="fas fa-times-circle" onclick="openPopup()"></i>
                </div>
                <div class="popup-content">test</div>
            </div>
            <div class="modal-close" onclick="openPopup()"></div>
        </div>
        <!-- modal-search -->
        <div id="searchModal" class="modal">
            <div class="modal-content">
                <input type="text" id="modalInput" placeholder="Tìm tên sao, quẻ dịch...">
                <div class="modal-hints">Gợi ý: <i>Sao Tử Vi, Quẻ Càn, Cách cục Cơ Nguyệt Đồng Lương...</i></div>
            </div>
            <div class="modal-close" onclick="openSearch()"></div>
        </div>
    </body>
</html>
