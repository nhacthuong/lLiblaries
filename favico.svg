<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(-30 32 32)">

    <!-- CUỘN TRÊN (đã hạ xuống ~1/4) -->
    <g>
      <rect x="13" y="15" width="14" height="6" rx="3" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"></rect>

      <rect x="13" y="21" width="14" height="26" rx="3" fill="#7ee787"></rect>

      <!-- highlight -->
      <rect x="18" y="21" width="3" height="26" fill="#aff5b4" opacity="0.18"></rect>

      <!-- nan -->
      <line x1="17" y1="21" x2="17" y2="47" stroke="#aff5b4" stroke-width="1"></line>
      <line x1="22" y1="21" x2="22" y2="47" stroke="#aff5b4" stroke-width="1"></line>

      <rect x="13" y="47" width="14" height="6" rx="3" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"></rect>
    </g>

    <!-- CUỘN DƯỚI (giữ nguyên) -->
    <g>
      <rect x="33" y="9" width="14" height="6" rx="3" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"></rect>

      <rect x="33" y="15" width="14" height="28" rx="3" fill="#7ee787"></rect>

      <!-- highlight -->
      <rect x="38" y="15" width="3" height="28" fill="#aff5b4" opacity="0.18"></rect>

      <!-- nan -->
      <line x1="37" y1="15" x2="37" y2="43" stroke="#aff5b4" stroke-width="1"></line>
      <line x1="42" y1="15" x2="42" y2="43" stroke="#aff5b4" stroke-width="1"></line>

      <rect x="33" y="43" width="14" height="6" rx="3" fill="#7ee787" stroke="#aff5b4" stroke-width="1.5"></rect>
    </g>

    <!-- DÂY ĐỎ (simple + chuẩn) -->
    <line x1="10" y1="32" x2="54" y2="32" stroke="#ff7b72" stroke-width="2.6" stroke-linecap="round"></line>

    <!-- ẤN (chấm đỏ) -->
    <circle cx="32" cy="32" r="3" fill="#ff7b72"></circle>

  </g>
</svg>